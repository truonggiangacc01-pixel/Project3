spring.application.name=project3
server.port=6768

spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=HorseRacingDatabaseV1;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=12345
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

spring.thymeleaf.cache=false 
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Swagger/OpenAPI Configuration ============================================
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v2/api-docs

# Mail Configuration =======================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=dummy@gmail.com
spring.mail.password=dummy
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true